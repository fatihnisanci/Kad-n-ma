<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAYATIMIN KADININA ❤️</title>
    <style>
        body {
            background: linear-gradient(#ff9a9e, #fad0c4);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            overflow: hidden;
        }
        h1 { color: white; font-size: 24px; padding: 0 20px; text-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        button {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            background: #ff3366;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 100;
        }
        img {
            width: 85%;
            max-width: 350px;
            border-radius: 20px;
            margin-top: 20px;
            display: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .mesajlar { color: white; display: none; z-index: 10; }
        p { font-size: 18px; font-weight: 600; margin: 10px 20px; }
        .heart {
            position: fixed;
            top: 100vh;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-115vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>Kadınlar günün kutlu olsun hayatımın kadını, çiçek için tıklasana ;) 🌹</h1>
    
    <button id="btn" onclick="ac()">Çiçeği Aç ❤️</button>
    
    <img id="lilyum" src="https://images.unsplash.com/photo-1596193712033-03e29864f16a?auto=format&fit=crop&w=600" alt="Lilyum Buketi">
    
    <div id="altMesaj" class="mesajlar">
        <p>Baban evde diye çiçeksiz kalacak değilsin ya ❤️</p>
    </div>

    <script>
        function ac() {
            document.getElementById("btn").style.display = "none";
            document.getElementById("lilyum").style.display = "block";
            document.getElementById("altMesaj").style.display = "block";
            setInterval(createHeart, 300);
        }

        function createHeart() {
            const h = document.createElement("div");
            h.className = "heart";
            h.innerHTML = "❤️";
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 20 + 15) + "px";
            document.body.appendChild(h);
            setTimeout(() => { h.remove(); }, 4000);
        }
    </script>
</body>
</html>
