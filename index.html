<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Senin İçin ❤️</title>

<style>
body{
background: linear-gradient(#ff9a9e,#fad0c4);
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
color:white;
font-size:35px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff3366;
color:white;
cursor:pointer;
margin-top:20px;
}

img{
width:250px;
margin-top:30px;
display:none;
}

p{
color:white;
font-size:22px;
margin-top:20px;
display:none;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}
</style>

</head>

<body>

<h1>Sana bir çiçek gönderdim 🌹</h1>

<button onclick="cicek()">Çiçeği Aç</button>

<img id="gul" src="https://upload.wikimedia.org/wikipedia/commons/3/35/Rose_pink_1.jpg">

<p id="mesaj">Baban evde diye çiçeksiz kalacak değilsin ya ❤️</p>

<script>
function cicek(){
document.getElementById("gul").style.display="block";
document.getElementById("mesaj").style.display="block";

setInterval(function(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+20)+"px";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},4000);
},300);
}
</script>

</body>
</html>
