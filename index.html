<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÜRPRİZ! 💥</title>
    <style>
        body {
            background: radial-gradient(circle, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            color: white;
            font-size: 28px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            padding: 0 20px;
            transition: 0.5s;
        }

        #btn {
            padding: 20px 40px;
            font-size: 22px;
            border: none;
            border-radius: 50px;
            background: #ff3366;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 51, 102, 0.4);
            font-weight: bold;
            transition: 0.3s;
            z-index: 100;
        }

        #btn:hover { transform: scale(1.1); background: #ff0044; }

        img {
            width: 85%;
            max-width: 380px;
            border-radius: 30px;
            display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            z-index: 10;
            animation: popIn 0.6s cubic-bezier(0.17, 0.67, 0.83, 1.5);
        }

        .mesajlar {
            color: white;
            display: none;
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
        }

        /* Patlama Animasyonu */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Konfeti Parçaları */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            z-index: 5;
            animation: fall 3s ease-out forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1 id="baslik">Senin için küçük bir patlayıcı hazırladım... 💣</h1>
    
    <button id="btn" onclick="patlat()">DOKUN VE GÖR!</button>
    
    <img id="cicek" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJSlyElGF6EiaMtkkZWufcgLP5AiEMOlDeFV_5xN2152TpCOWtZ5Qdbydz&s=10">
    
    <div id="altMesaj" class="mesajlar">
        KADINLAR GÜNÜN KUTLU OLSUN HAYATIM ❤️
    </div>

    <script>
        function patlat() {
            // Butonu ve başlığı değiştir
            document.getElementById("btn").style.display = "none";
            document.getElementById("baslik").innerHTML = "BOOOM! 💥🌸";
            
            // Çiçeği ve mesajı göster
            document.getElementById("cicek").style.display = "block";
            document.getElementById("altMesaj").style.display = "block";

            // Konfeti Yağmuru Başlat
            for(let i=0; i<100; i++) {
                createConfetti();
            }

            // Sürekli kalp akışını devam ettir
            setInterval(createConfetti, 150);
        }

        function createConfetti() {
            const colors = ['#ff3366', '#ffffff', '#ffedbc', '#ff9a9e', '#fad0c4'];
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            
            // Rastgele şekil (Kalp veya Kare)
            confetti.innerHTML = Math.random() > 0.5 ? "❤️" : "🌸";
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.top = "-10px";
            confetti.style.fontSize = (Math.random() * 20 + 10) + "px";
            confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            document.body.appendChild(confetti);
            
            // Temizleme
            setTimeout(() => { confetti.remove(); }, 3000);
        }
    </script>
</body>
</html>
